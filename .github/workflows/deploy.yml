# Cloudflare Pages 배포 (GitHub Secrets 필요)
# Repository → Settings → Secrets and variables → Actions 에서 설정:
#   CLOUDFLARE_API_TOKEN   — API 토큰 (Account · Cloudflare Pages · Edit)
#   CLOUDFLARE_ACCOUNT_ID  — 대시보드 우측 하단 또는 Workers 개요

name: Deploy Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm install && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=together
